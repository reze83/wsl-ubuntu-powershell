name: Lint

permissions:
  contents: read

on:
  push:
    paths:
      - '*.sh'
      - '*.ps1'
      - '*.psm1'
      - '*.psd1'
      - '*.cmd'
      - 'tests/**'
      - '.gitattributes'
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '*.sh'
      - '*.ps1'
      - '*.psm1'
      - '*.psd1'
      - '*.cmd'
      - 'tests/**'
      - '.gitattributes'
      - '.github/workflows/*.yml'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run ShellCheck
        run: shellcheck ubuntu-wsl-setup.sh ubuntu-wsl-validate.sh

  powershell-encoding:
    name: PowerShell Encoding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify UTF-8 BOM for PowerShell files
        run: |
          set -euo pipefail

          files="$(git ls-files '*.ps1' '*.psm1' '*.psd1')"
          if [ -z "$files" ]; then
            echo "No PowerShell files found."
            exit 0
          fi

          failed=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            bom="$(od -An -tx1 -N3 "$file" | tr -d ' \n')"
            if [ "$bom" != "efbbbf" ]; then
              echo "::error file=$file::PowerShell files must be UTF-8 with BOM (EF BB BF)."
              failed=1
            fi
          done <<< "$files"

          exit "$failed"

  pester:
    name: Pester Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -SkipPublisherCheck

      - name: Run Pester tests
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path tests/ -PassThru -Output Detailed
          $summary = "## Pester Results`n`n"
          $summary += "| Metric | Count |`n|--------|-------|`n"
          $summary += "| Passed | $($result.PassedCount) |`n"
          $summary += "| Failed | $($result.FailedCount) |`n"
          $summary += "| Skipped | $($result.SkippedCount) |`n"
          $summary | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          if ($result.FailedCount -gt 0) { exit 1 }

  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck
          $files = Get-ChildItem -Path . -Recurse -File -Include '*.ps1','*.psm1','*.psd1' |
            Where-Object { $_.Name -notlike '*.Tests.ps1' }
          $excluded = @('PSUseApprovedVerbs','PSUseShouldProcessForStateChangingFunctions','PSUseSingularNouns')
          $results = $files | ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName -Severity Error,Warning -ExcludeRule $excluded } | Where-Object { $_ }
          $results | Format-Table -AutoSize
          if ($results.Count -gt 0) {
            $summary = "## PSScriptAnalyzer`n`n"
            $summary += "| Severity | Rule | File | Line |`n|----------|------|------|------|`n"
            foreach ($r in $results) {
              $summary += "| $($r.Severity) | $($r.RuleName) | $($r.ScriptName) | $($r.Line) |`n"
            }
            $summary | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
            exit 1
          }
